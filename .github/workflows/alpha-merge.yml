# ---------------------------------------------------------------------------
# Alpha Merge
#
# Triggered automatically when a PR is merged into the 'alpha' branch.
# Creates a pipeline state tag so that the manual promote workflows
# know a new alpha merge is ready for promotion.
# ---------------------------------------------------------------------------
name: "Alpha: Mark Ready"

on:
  push:
    branches:
      - alpha

permissions:
  contents: write
  pull-requests: read

jobs:
  mark-alpha-ready:
    runs-on: [self-hosted, Linux, X64, aws, brapps, web]
    steps:
      - name: Checkout alpha
        uses: actions/checkout@v6
        with:
          ref: alpha
          fetch-depth: 50
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Detect feature branch
        id: find
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "Commit SHA: ${COMMIT_SHA}"

          # Method 1: Use the commits API to find associated PRs
          FEATURE=$(gh api \
            "repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" \
            --jq '[.[] | select(.base.ref == "alpha")][0].head.ref // empty' 2>/dev/null || echo "")
          echo "Method 1 (commits/pulls API): '${FEATURE}'"

          # Method 2: Search for merged PRs whose merge_commit_sha matches
          if [ -z "$FEATURE" ]; then
            FEATURE=$(gh pr list \
              --base alpha \
              --state merged \
              --limit 10 \
              --json headRefName,mergeCommitSha \
              --jq "[.[] | select(.mergeCommitSha == \"${COMMIT_SHA}\")][0].headRefName // empty" 2>/dev/null || echo "")
            echo "Method 2 (merge commit match): '${FEATURE}'"
          fi

          # Method 3: Parse the squash merge commit message
          # GitHub squash merges use the format: "Title (#123)" — extract the PR number and look it up
          if [ -z "$FEATURE" ]; then
            PR_NUM=$(git log -1 --pretty=%s | grep -oP '#\K\d+' || echo "")
            if [ -n "$PR_NUM" ]; then
              FEATURE=$(gh pr view "$PR_NUM" --json headRefName --jq '.headRefName // empty' 2>/dev/null || echo "")
              echo "Method 3 (PR number from commit message #${PR_NUM}): '${FEATURE}'"
            fi
          fi

          # Skip known non-feature branches
          if [ "$FEATURE" == "beta" ] || [ "$FEATURE" == "live" ] || [ "$FEATURE" == "develop" ] || [ "$FEATURE" == "alpha" ]; then
            echo "::warning::Merged branch '$FEATURE' is not a feature branch. Setting to unknown."
            FEATURE="unknown"
          fi

          if [ -z "$FEATURE" ]; then
            FEATURE="unknown"
            echo "::warning::Could not determine feature branch. The merge-to-develop step will be skipped at promote-to-live time."
          fi

          echo "branch=$FEATURE" >> "$GITHUB_OUTPUT"
          echo "::notice::Detected feature branch: $FEATURE"

      - name: Tag pipeline state
        shell: bash
        env:
          FEATURE_BRANCH: ${{ steps.find.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove stale pipeline tags
          git push origin --delete refs/tags/pipeline/alpha-ready 2>/dev/null || true
          git push origin --delete refs/tags/pipeline/beta-ready 2>/dev/null || true

          # Create new tag with feature branch info
          git tag -a pipeline/alpha-ready -m "feature-branch: ${FEATURE_BRANCH}" -f
          git push origin pipeline/alpha-ready --force

          echo "::notice::Alpha merge tagged. Feature branch: ${FEATURE_BRANCH}. Ready for 'Promote to Beta'."
