# ---------------------------------------------------------------------------
# Promote to Live
#
# Manually triggered after a successful beta promotion.
# - Verifies pipeline/beta-ready tag exists
# - Checks version has been bumped and ChangeLog updated
# - Merges beta → live
# - Merges feature branch → develop and deletes it
# - Creates a GitHub Release
# - Cleans up pipeline tags
# ---------------------------------------------------------------------------
name: "Live: Promote from Beta"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------ #
  # Gate: verify beta has been promoted                                #
  # ------------------------------------------------------------------ #
  check-pipeline-state:
    runs-on: [self-hosted, Linux, X64, aws, brapps, web]
    outputs:
      feature_branch: ${{ steps.check.outputs.feature_branch }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Verify beta-ready tag exists
        id: check
        shell: bash
        run: |
          if ! git rev-parse pipeline/beta-ready >/dev/null 2>&1; then
            echo "::error::No beta promotion found. Promote to beta first."
            exit 1
          fi

          FEATURE=$(git tag -l --format='%(contents:subject)' pipeline/beta-ready | grep -oP 'feature-branch: \K.*' || echo "unknown")
          echo "feature_branch=$FEATURE" >> "$GITHUB_OUTPUT"
          echo "::notice::Beta promotion found. Feature branch: $FEATURE. Proceeding with promotion to live."

  # ------------------------------------------------------------------ #
  # Gate: verify version bumped and ChangeLog updated                  #
  # ------------------------------------------------------------------ #
  check-version:
    runs-on: [self-hosted, Linux, X64, aws, brapps, web]
    needs: check-pipeline-state
    steps:
      - name: Checkout beta branch
        uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0
          fetch-tags: true

      - name: Verify version and ChangeLog
        shell: bash
        run: |
          export NVM_DIR=~/.nvm
          source ~/.nvm/nvm.sh
          BETA_VERSION=$(node -p "require('./package.json').version")
          echo "Version in beta package.json: ${BETA_VERSION}"

          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1 || echo "")

          if [ -n "$LATEST_TAG" ]; then
            LATEST_VERSION="${LATEST_TAG#v}"
            echo "Latest release tag: ${LATEST_TAG} (version: ${LATEST_VERSION})"

            if [ "$BETA_VERSION" == "$LATEST_VERSION" ]; then
              echo ""
              echo "::error::Version ${BETA_VERSION} in package.json has NOT been updated since the last release (${LATEST_TAG})."
              echo "::error::Please bump the version in package.json AND add a matching entry in ChangeLog.md on your feature branch, PR it into alpha, and promote to beta again before promoting to live."
              echo ""
              exit 1
            fi

            echo "::notice::Version check passed — ${BETA_VERSION} is newer than last release ${LATEST_TAG}."
          else
            echo "::notice::No existing release tags found. First release — version check passed."
          fi

          if ! grep -qE "^#${BETA_VERSION}(\\s|$)" ChangeLog.md; then
            echo ""
            echo "::error::ChangeLog.md does not contain an entry for version ${BETA_VERSION}."
            echo "::error::Please add a '#${BETA_VERSION}' section to ChangeLog.md on your feature branch, PR it into alpha, and promote to beta again before promoting to live."
            echo ""
            exit 1
          fi

          echo "::notice::ChangeLog.md contains an entry for version ${BETA_VERSION}. All pre-release checks passed."

  # ------------------------------------------------------------------ #
  # Merge beta → live                                                  #
  # ------------------------------------------------------------------ #
  merge-beta-to-live:
    runs-on: [self-hosted, Linux, X64, aws, brapps, web]
    needs: check-version
    steps:
      - name: Checkout live
        uses: actions/checkout@v4
        with:
          ref: live
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Merge beta into live
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin beta
          git merge origin/beta -m "Merge beta into live (promote-to-live workflow)"
          git push origin live

  # ------------------------------------------------------------------ #
  # Merge feature branch → develop, delete it, clean up tags          #
  # ------------------------------------------------------------------ #
  finalise-release:
    runs-on: [self-hosted, Linux, X64, aws, brapps, web]
    needs: [merge-beta-to-live, check-pipeline-state]
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Merge feature branch into develop and clean up
        shell: bash
        env:
          FEATURE_BRANCH: ${{ needs.check-pipeline-state.outputs.feature_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$FEATURE_BRANCH" != "unknown" ] && [ -n "$FEATURE_BRANCH" ]; then
            if git ls-remote --exit-code --heads origin "$FEATURE_BRANCH" >/dev/null 2>&1; then
              echo "Merging feature branch '$FEATURE_BRANCH' into develop"
              git fetch origin "$FEATURE_BRANCH"
              git merge "origin/$FEATURE_BRANCH" -m "Merge feature branch '${FEATURE_BRANCH}' into develop (release complete)"
              git push origin develop

              echo "Deleting feature branch '$FEATURE_BRANCH'"
              git push origin --delete "$FEATURE_BRANCH"
              echo "::notice::Feature branch '$FEATURE_BRANCH' merged into develop and deleted."
            else
              echo "::warning::Feature branch '$FEATURE_BRANCH' no longer exists on remote. Skipping merge into develop."
            fi
          else
            echo "::warning::Could not determine feature branch name. Skipping merge into develop."
          fi

          # Clean up pipeline tags
          git push origin --delete refs/tags/pipeline/beta-ready 2>/dev/null || true
          git push origin --delete refs/tags/pipeline/alpha-ready 2>/dev/null || true

  # ------------------------------------------------------------------ #
  # Create a GitHub Release                                            #
  # ------------------------------------------------------------------ #
  create-release:
    runs-on: [self-hosted, Linux, X64, aws, brapps, web]
    needs: [finalise-release, check-pipeline-state]
    steps:
      - name: Checkout live
        uses: actions/checkout@v4
        with:
          ref: live
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Read version from package.json
        id: version
        shell: bash
        run: |
          export NVM_DIR=~/.nvm
          source ~/.nvm/nvm.sh
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Creating release for v${VERSION}"

      - name: Create release tag and GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          FEATURE_BRANCH: ${{ needs.check-pipeline-state.outputs.feature_branch }}
        run: |
          TAG="v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "Release ${TAG}" -f
          git push origin "$TAG" --force

          NOTES="## coriolis-data ${TAG}

          Released on $(date -u '+%Y-%m-%d %H:%M UTC').

          **Feature branch:** \`${FEATURE_BRANCH}\`"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — updating"
            gh release edit "$TAG" \
              --title "coriolis-data ${TAG}" \
              --notes "$NOTES" \
              --target live
          else
            gh release create "$TAG" \
              --title "coriolis-data ${TAG}" \
              --notes "$NOTES" \
              --target live
          fi

          echo "::notice::Release ${TAG} created — https://github.com/${{ github.repository }}/releases/tag/${TAG}"
